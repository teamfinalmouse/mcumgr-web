name: Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build-lib:
    name: Build library (ESM + IIFE + d.ts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build typed ESM (tsc)
        run: npm run build

      - name: Build single-file bundles (ESM + IIFE)
        run: npm run build:bundle

      - name: Run unit tests
        run: npm test

      - name: Stage release files
        run: |
          mkdir -p artifacts/mcumgr-web-lib
          cp -r dist package.json artifacts/mcumgr-web-lib/
          for f in README* LICENSE*; do
            [ -e "$f" ] && cp "$f" artifacts/mcumgr-web-lib/ || true
          done

      - uses: actions/upload-artifact@v4
        with:
          name: mcumgr-web-lib
          if-no-files-found: error
          path: artifacts/mcumgr-web-lib/

  build-cli:
    name: Build CLI (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runner: ubuntu-latest
            target: node22-linux-x64
            ext: ""
          - label: windows-x64
            runner: ubuntu-latest
            target: node22-win-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build dist
        run: npm run build

      - name: Package CLI
        run: |
          npx --yes @yao-pkg/pkg . \
            --targets ${{ matrix.target }} \
            --output mcumgr-web-${{ matrix.label }}${{ matrix.ext }}

      - uses: actions/upload-artifact@v4
        with:
          name: mcumgr-web-cli-${{ matrix.label }}
          if-no-files-found: error
          path: mcumgr-web-${{ matrix.label }}${{ matrix.ext }}

  release:
    name: Draft release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-lib, build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Stage release assets
        run: |
          mkdir -p release-files
          tar czf release-files/mcumgr-web-lib.tar.gz -C release-artifacts/mcumgr-web-lib .
          cp release-artifacts/mcumgr-web-lib/dist/mcumgr-web.js      release-files/mcumgr-web.esm.js
          cp release-artifacts/mcumgr-web-lib/dist/mcumgr-web.iife.js release-files/mcumgr-web.iife.js
          for d in release-artifacts/mcumgr-web-cli-*; do
            cp "$d"/* release-files/
          done
          ls -l release-files

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: mcumgr-web ${{ github.ref_name }}
          files: |
            release-files/*
